services:
  repo-scanner:
    # image: ghcr.io/idohomri-io/repo-scanner:latest
    # pull_policy: always
    build: .
    environment:
      # Comma-separated repo list.
      # Accepts GitHub owner/repo shorthand, full Git URLs, or local paths.
      REPOS:

      # Optional provider tokens for cloning private HTTPS repos.
      # Prefer read-only tokens. For GitHub fine-grained PATs, grant Contents: Read-only.
      GH_TOKEN: 
      GITLAB_TOKEN:
      BITBUCKET_USERNAME:
      BITBUCKET_TOKEN:

      # Hours between scans.
      INTERVAL_HOURS: "24"

      # Days of reports/ history to keep on disk. Older dated report files
      # (.md, .findings.json, .state.json, .webhook.json) are deleted after each scan.
      REPORT_RETENTION_DAYS: "10"

      # Port the health dashboard web server listens on inside the container.
      WEB_PORT: "8080"

      # Optional: protect the dashboard with HTTP Basic Auth.
      # Leave both unset to leave the dashboard open (a warning is logged).
      DASHBOARD_USER:
      DASHBOARD_PASSWORD:

      # Optional: POST a per-repo JSON array payload after each scan.
      WEBHOOK_URL:

      # Optional LLM recommendations. Use "none", "ollama", or "openai-compatible".
      LLM_PROVIDER: none
      LLM_ENDPOINT: http://host.docker.internal:11434
      LLM_MODEL: llama3.1
      LLM_API_KEY:
    ports:
      - "8080:8080"
    volumes:
      - ./reports:/app/reports
      # Uncomment to scan local repos and reference them in REPOS as /repos/name.
      # - /absolute/path/to/your/repos:/repos:ro
      #
      # Uncomment to clone private SSH URLs such as git@github.com:owner/repo.git.
      # Prefer a deploy key or read-only key when possible.
      # - ${HOME}/.ssh:/root/.ssh:ro
    restart: unless-stopped
